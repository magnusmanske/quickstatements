<style>
	div.command_row {
		display: flex;
		flex-direction: row;
		flex-wrap: wrap;
		flex: auto;
		align-items: baseline;
		padding-top: 0.5rem;
	}

	div.command_row:nth-child(even) {
		background: var(--qs-background-neutral);
	}

	div.command_status {
		display: flex;
		width: 14px;
		height: var(--qs-line-height-small);
		align-items: center;
		justify-content: center;
	}

	.command_state {
		display: inline-flex;
		width: 12px;
		height: 12px;
		align-items: center;
		justify-content: center;
		transform: translateY(1px);
	}

	.command_state svg {
		width: 12px;
		height: 12px;
		fill: currentColor;
	}

	.command_state--init { color: var(--qs-category-gray-400); }
	.command_state--run { color: var(--qs-progressive-active); }
	.command_state--done { color: var(--qs-icon-success); }
	.command_state--unchanged { color: var(--qs-icon-success); }
	.command_state--error { color: var(--qs-destructive); }
	.command_state--unknown { color: #72777d; }

	div.command_action {
		width: 4em;
	}

	div.command_action_cell {
		padding: 1px 2px;
	}

	div.command_id {
		display: flex;
		width: auto;
		min-width: 4ch;
		margin: 0;
		padding-inline: 2px 8px;
		font-family: var(--qs-font-monospace);
		font-size: var(--qs-font-size-small);
		line-height: var(--qs-line-height-small);
		align-items: baseline;
		justify-content: right;
	}

	div.command_what {
		width: 6em;
	}

	div.command_auto_grow {
		display: flex;
		flex-grow: 3;
		flex-basis: 0;
		align-items: baseline;
	}

	div.command_part {
		display: flex;
		flex-direction: row;
	}

	div.command_part>div {
		padding-left: 2px;
		padding-right: 2px;
	}

	div.qualifier_or_reference_column {
		display: flex;
		flex-direction: column;
		margin-left: 1rem;
		padding-left: 0.1rem;
		border-left: 1px dotted #BBB;
	}

	div.qualifier_or_reference_column>div {
		display: flex;
		flex-direction: column;
	}

	div.command_message {
		flex: 1 0 100%;
		margin-block: 4px;
		padding: 6px 8px;
		border: 1px solid #c8ccd1;
		border-inline-start: 3px solid #72777d;
		background: #fff;
		font-size: var(--qs-font-size-small);
		line-height: var(--qs-line-height-small);
		overflow-wrap: anywhere;
	}

	div.command_message--error {
		border-inline-start-color: var(--qs-destructive);
	}

	div.command_message--unchanged {
		border-inline-start-color: var(--qs-icon-success);
	}

	@media (max-width: 767px) {
		div.command_row {
			display: grid;
			grid-template-columns: 14px max-content minmax(0, 1fr);
			align-items: start;
			row-gap: 4px;
			width: 100%;
		}

		div.command_id,
		div.command_status,
		div.command_action {
			width: auto;
		}

		div.command_item {
			min-width: 0;
			overflow-wrap: anywhere;
		}

		div.command_action_cell {
			grid-column: 1 / 3;
		}

		div.command_details {
			grid-column: 3;
			min-width: 0;
		}

		div.command_message {
			grid-column: 1 / -1;
			margin-block: 2px 4px;
		}

		div.command_part {
			flex-wrap: wrap;
			min-width: 0;
			overflow-wrap: anywhere;
		}

		div.command_what {
			width: auto;
			min-width: 0;
			margin-inline-end: 4px;
		}
	}
</style>

<template id='datavalue-template'>
	<div style='flex-grow:1'>
		<div v-if='dv.type=="wikibase-entityid"'>
			<wd-link :item='dv.value.id' smallq='1'></wd-link>
		</div>
		<div v-else-if='dv.type=="globecoordinate"'>
			<a target='_blank' class='external'
				:href='"https://maps.wikimedia.org/#7/"+dv.value.latitude+"/"+dv.value.longitude'>{{dv.value.latitude}}/{{dv.value.longitude}}</a>
			(on <wd-link :item='dv.value.globe.replace(/^.+\//,"")'></wd-link>)
		</div>
		<div v-else-if='dv.type=="quantity"'>
			{{dv.value.amount}}
			<span v-if='typeof dv.value.unit!="undefined" && dv.value.unit!="1"'>
				<wd-link :item='dv.value.unit.replace(/^.+\//,"")'></wd-link>
			</span>
		</div>
		<div v-else-if='dv.type=="monolingualtext"'>
			<i>{{dv.value.language}}</i>:"<tt>{{dv.value.text}}</tt>"
		</div>
		<div v-else-if='dv.type=="string"'>
			"<tt>{{dv.value}}</tt>"
		</div>
		<div v-else-if='dv.type=="time"'>
			<span v-if='dv.value.precision==11'>
				{{dv.value.time.replace(/^\+/,'').replace(/T.*$/,'')}}
			</span>
			<span v-else-if='dv.value.precision==10'>
				{{dv.value.time.replace(/^\+/,'').replace(/-\d\dT.*$/,'')}}
			</span>
			<span v-else-if='dv.value.precision==9'>
				{{dv.value.time.replace(/^\+/,'').replace(/-\d\d-\d\dT.*$/,'')}}
			</span>
			<span v-else>
				{{dv.value.time}}
			</span>
		</div>
		<div v-else>
			{{dv}}
		</div>
	</div>
</template>

<template id='command-template'>
	<div class='command_row' :key='command.meta.id'>
		<div class='command_status'>
			<span class='command_state'
				:class='"command_state--"+commandState'
				:aria-label='commandStateLabel'
				:title='commandStateTitle'
				role='img'>
				<svg v-if='commandState=="error"' viewBox='0 0 20 20' aria-hidden='true'><path d='M17.7575 6.04807c.3233-.32335.3233-.84759 0-1.17094l-2.6346-2.63462c-.3234-.32335-.8476-.32335-1.171 0L10.5855 5.609a.828.828 0 0 1-1.171 0L6.0481 2.2425c-.3234-.3233-.8476-.3233-1.171 0L2.2425 4.8771c-.3233.3234-.3233.8476 0 1.171L5.609 9.4145a.828.828 0 0 1 0 1.171l-3.3665 3.3664c-.3233.3234-.3233.8476 0 1.171l2.6346 2.6346c.3234.3233.8476.3233 1.171 0l3.3664-3.3665a.828.828 0 0 1 1.171 0l3.3664 3.3665c.3234.3233.8476.3233 1.171 0l2.6346-2.6346c.3233-.3234.3233-.8476 0-1.171l-3.3665-3.3664a.828.828 0 0 1 0-1.171z'/></svg>
				<svg v-else-if='commandState=="unchanged"' viewBox='0 0 20 20' aria-hidden='true'><path d='M9.3572.5208c.194-.6944 1.0916-.6944 1.2856 0l1.325 4.7424c.1032.3696.4499.5888.7938.502l4.4123-1.1145c.6461-.1632 1.0949.6882.6428 1.2194l-3.0873 3.6279a.77.77 0 0 0 0 1.004l3.0873 3.6279c.4521.5312.0033 1.3826-.6428 1.2194l-4.4123-1.1144c-.3439-.0869-.6906.1323-.7938.502l-1.325 4.7423c-.194.6944-1.0916.6944-1.2856 0l-1.325-4.7423c-.1032-.3697-.4499-.5889-.7938-.502l-4.4123 1.1144c-.6461.1632-1.0949-.6882-.6428-1.2194l3.0873-3.6279a.77.77 0 0 0 0-1.004L2.1833 5.8701c-.4521-.5312-.0033-1.3826.6428-1.2194l4.4123 1.1145c.3439.0868.6906-.1324.7938-.502z'/></svg>
				<svg v-else viewBox='0 0 20 20' aria-hidden='true'><path d='M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0'/></svg>
			</span>
		</div>
		<div class='command_id'>
			{{command.meta.id+1}}
		</div>

		<div class='command_auto_grow command_item' style='flex-grow:1'>
			<div v-if='typeof command.item!="undefined"'>
				<span v-if='site=="commons"'>
					<span v-if='file_label==command.item'>
						{{file_label.replace(/^File:/,'')}}
					</span>
					<a v-else class='external' :href='"https://commons.wikimedia.org/wiki/"+file_label' target='_blank'>
						{{file_label.replace(/^File:/,'')}}
					</a>
				</span>
				<span v-else>
					<wd-link v-if='command.item!="LAST" && command.item!="LAST_FORM" && command.item!="LAST_SENSE"'
						:item='command.item' smallq='1'></wd-link>
					<span v-else-if='command.item=="LAST_FORM"'><i>Last created form</i></span>
					<span v-else-if='command.item=="LAST_SENSE"'><i>Last created sense</i></span>
					<span v-else><i>Last created item</i></span>
				</span>
			</div>
		</div>

		<div class='command_action_cell'>
			<div v-if='typeof command.action!="undefined"' class='command_action'>
				<span v-if='command.action.toUpperCase()=="ADD"'
					class="qs-action-badge qs-action-badge--add">{{command.action}}</span>
				<span v-else-if='command.action.toUpperCase()=="CREATE"'
					class="qs-action-badge qs-action-badge--create">{{command.action}}</span>
				<span v-else-if='command.action.toUpperCase()=="MERGE"'
					class="qs-action-badge qs-action-badge--merge">{{command.action}}</span>
				<span v-else-if='command.action.toUpperCase()=="REMOVE"'
					class="qs-action-badge qs-action-badge--remove">{{command.action}}</span>
				<span v-else class="qs-action-badge qs-action-badge--unknown">{{command.action}}</span>
			</div>
		</div>

		<div v-if='command.action=="add"' class='command_auto_grow command_details'>

			<div v-if='command.what=="statement"' class='command_part'>
				<div class='command_what'>Statement</div>
				<div class='command_part2'><wd-link :item='command.property' smallq='1'></wd-link></div>
				<div>:</div>
				<datavalue :dv='command.datavalue'></datavalue>
			</div>
			<div v-else-if='command.what=="label"' class='command_part'>
				<div class='command_what'>Label</div>
				<div><i>{{command.language}}</i>:"<tt>{{command.value}}</tt>"</div>
			</div>
			<div v-else-if='command.what=="alias"' class='command_part'>
				<div class='command_what'>Alias</div>
				<div><i>{{command.language}}</i>:"<tt>{{command.value}}</tt>"</div>
			</div>
			<div v-else-if='command.what=="sitelink"' class='command_part'>
				<div class='command_what'>Sitelink</div>
				<div><i>{{command.site}}</i>:"<tt>{{command.value}}</tt>"</div>
			</div>
			<div v-else-if='command.what=="description"' class='command_part'>
				<div class='command_what'>Description</div>
				<div><i>{{command.language}}</i>:<tt>{{command.value}}</tt></div>
			</div>
			<div v-else-if='command.what=="sources"' class='command_part'>
				<div class='command_what'>Sources to</div>
				<div><wd-link :item='command.property' smallq='1'></wd-link></div>
				<div>:</div>
				<div>
					<datavalue :dv='command.datavalue'></datavalue>
				</div>
				<div style='margin-right:20px;'></div>
				<div style='display:flex;flex-direction:column;'>
					<div v-for='s in command.sources' style='display:flex;flex-direction:row;'>
						<div><wd-link :item='s.prop' smallq='1'></wd-link></div>
						<div>:</div>
						<div>
							<datavalue :dv='s.value'></datavalue>
						</div>
					</div>
				</div>
			</div>
			<div v-else-if='command.what=="qualifier"' class='command_part'>
				<div class='command_what'>Qualifier to</div>
				<div><wd-link :item='command.property' smallq='1'></wd-link></div>
				<div>:</div>
				<div>
					<datavalue :dv='command.datavalue'></datavalue>
				</div>
				<div style='margin-right:20px;'></div>
				<div><wd-link :item='command.qualifier.prop' smallq='1'></wd-link></div>
				<div>:</div>
				<div>
					<datavalue :dv='command.qualifier.value'></datavalue>
				</div>
			</div>
			<div v-else-if='command.what=="lemma"' class='command_part'>
				<div class='command_what'>Lemma</div>
				<div><i>{{command.language}}</i>:"<tt>{{command.value}}</tt>"</div>
			</div>
			<div v-else-if='command.what=="representation"' class='command_part'>
				<div class='command_what'>Representation</div>
				<div><i>{{command.language}}</i>:"<tt>{{command.value}}</tt>"</div>
			</div>
			<div v-else-if='command.what=="gloss"' class='command_part'>
				<div class='command_what'>Gloss</div>
				<div><i>{{command.language}}</i>:"<tt>{{command.value}}</tt>"</div>
			</div>
			<div v-else-if='command.what=="lexical_category"' class='command_part'>
				<div class='command_what'>Lexical&nbsp;category</div>
				<div><wd-link :item='command.value' smallq='1'></wd-link></div>
			</div>
			<div v-else-if='command.what=="language" && typeof command.value=="string"' class='command_part'>
				<div class='command_what'>Language</div>
				<div><wd-link :item='command.value' smallq='1'></wd-link></div>
			</div>
			<div v-else-if='command.what=="grammatical_feature"' class='command_part'>
				<div class='command_what'>Grammatical&nbsp;features</div>
				<div style='display:flex;flex-direction:row;flex-wrap:wrap;gap:4px;'>
					<span v-for='(feat, idx) in command.value'>
						<wd-link :item='feat' smallq='1'></wd-link><span v-if='idx < command.value.length - 1'>,</span>
					</span>
				</div>
			</div>
			<div v-else>
				<pre>{{command}}</pre>
			</div>
			<div v-if='typeof command.summary!="undefined" && command.summary!=""'
				style='margin-left:20px;color:green;font-style:oblique;'>
				{{command.summary}}
			</div>
		</div>
		<div v-else-if='command.action=="merge" && command.type=="item"' class='command_auto_grow command_details'>
			<div class='command_what'>Item</div>
			<div class='command_part'>
				<div class='command_part2'><wd-link :item='command.item1' smallq='1'></wd-link></div>
				<div> &rArr; </div>
				<div class='command_part2'><wd-link :item='command.item2' smallq='1'></wd-link></div>
			</div>
			<div v-if='typeof command.summary!="undefined" && command.summary!=""'
				style='margin-left:20px;color:green;font-style:oblique;'>
				{{command.summary}}
			</div>
		</div>
		<div v-else-if='command.action=="create" && command.type=="item"' class='command_auto_grow command_details'>
			<div class='command_what'>Item</div>
			<div class='command_part' v-if='typeof command.data!="undefined"'>
				<div style='display:flex;flex-direction:column;'>
					<div v-for='x in (command.data.labels||[])'><i>{{x.language}}</i>:<tt>{{x.value}}</tt></div>
					<div v-for='x in (command.data.aliases||[])'>
						<div v-for='y in x'><i>{{y.language}}</i>:<tt>{{y.value}}</tt></div>
					</div>
					<div v-for='x in (command.data.descriptions||[])'><i>{{x.language}}</i>:<tt>{{x.value}}</tt></div>
					<div v-for='x in (command.data.claims||[])' style='display:flex;flex-direction:row;'>
						<div><wd-link :item='x.mainsnak.property' smallq='1'></wd-link></div>
						<div>:</div>
						<div>
							<datavalue :dv='x.mainsnak.datavalue'></datavalue>
						</div>

						<div v-if='typeof x.qualifiers!="undefined"' class='qualifier_or_reference_column'>
							<div v-for='qualifier in x.qualifiers' style='display:flex;flex-direction:row'>
								<div><wd-link :item='qualifier.property' smallq='1'></wd-link></div>
								<div>:</div>
								<div>
									<datavalue :dv='qualifier.datavalue'></datavalue>
								</div>
							</div>
						</div>

						<div v-if='typeof x.references!="undefined"' class='qualifier_or_reference_column'>
							<div v-for='refgroup in x.references'>
								<div v-for='(refs,rprop) in refgroup.snaks' style='display:flex;flex-direction:row'>
									<div><wd-link :item='rprop' smallq='1'></wd-link></div>
									<div>:</div>
									<div style='display:flex;flex-direction:column'>
										<div v-for='ref in refs'>
											<datavalue :dv='ref.datavalue'></datavalue>
										</div>
									</div>
								</div>
							</div>
						</div>

					</div>
					<div v-for='x in (command.data.sitelinks||[])'><i>{{x.site}}</i>:<tt>{{x.title}}</tt></div>
				</div>
			</div>
		</div>
		<div v-else-if='command.action=="create" && command.type=="lexeme"' class='command_auto_grow command_details'>
			<div class='command_what'>Lexeme</div>
			<div class='command_part' v-if='typeof command.data!="undefined"'>
				<div style='display:flex;flex-direction:column;'>
					<div v-if='command.data.language' style='display:flex;flex-direction:row;gap:4px;'>
						<div>Language:</div>
						<div><wd-link :item='command.data.language' smallq='1'></wd-link></div>
					</div>
					<div v-if='command.data.lexicalCategory' style='display:flex;flex-direction:row;gap:4px;'>
						<div>Lexical category:</div>
						<div><wd-link :item='command.data.lexicalCategory' smallq='1'></wd-link></div>
					</div>
					<div v-for='x in (command.data.lemmas||{})'>
						<i>{{x.language}}</i>:"<tt>{{x.value}}</tt>"
					</div>
				</div>
			</div>
			<div v-if='typeof command.summary!="undefined" && command.summary!=""'
				style='margin-left:20px;color:green;font-style:oblique;'>
				{{command.summary}}
			</div>
		</div>
		<div v-else-if='command.action=="create" && command.type=="form"' class='command_auto_grow command_details'>
			<div class='command_what'>Form</div>
			<div class='command_part' v-if='typeof command.data!="undefined"'>
				<div style='display:flex;flex-direction:column;'>
					<div v-for='x in (command.data.representations||{})'>
						<i>{{x.language}}</i>:"<tt>{{x.value}}</tt>"
					</div>
					<div v-if='command.data.grammaticalFeatures && command.data.grammaticalFeatures.length > 0'
						style='display:flex;flex-direction:row;flex-wrap:wrap;gap:4px;'>
						<span>Features:</span>
						<span v-for='(feat, idx) in command.data.grammaticalFeatures'>
							<wd-link :item='feat' smallq='1'></wd-link><span
								v-if='idx < command.data.grammaticalFeatures.length - 1'>,</span>
						</span>
					</div>
				</div>
			</div>
			<div v-if='typeof command.summary!="undefined" && command.summary!=""'
				style='margin-left:20px;color:green;font-style:oblique;'>
				{{command.summary}}
			</div>
		</div>
		<div v-else-if='command.action=="create" && command.type=="sense"' class='command_auto_grow command_details'>
			<div class='command_what'>Sense</div>
			<div class='command_part' v-if='typeof command.data!="undefined"'>
				<div style='display:flex;flex-direction:column;'>
					<div v-for='x in (command.data.glosses||{})'>
						<i>{{x.language}}</i>:"<tt>{{x.value}}</tt>"
					</div>
				</div>
			</div>
			<div v-if='typeof command.summary!="undefined" && command.summary!=""'
				style='margin-left:20px;color:green;font-style:oblique;'>
				{{command.summary}}
			</div>
		</div>
		<div v-else-if='command.action=="remove"' class='command_auto_grow command_details'>
			<div v-if='command.what=="statement"' class='command_part'>
				<div class='command_what'>Statement</div>
				<div class='command_part2'><wd-link :item='command.property' smallq='1'></wd-link></div>
				<div>:</div>
				<datavalue :dv='command.datavalue'></datavalue>
			</div>
		</div>
		<div v-else class='command_auto_grow command_details'>
			<div>UNKNOWN COMMAND:</div>
			{{command}}
		</div>
		<div v-if='typeof command.meta.message!="undefined" && command.meta.message!="" && commandState!="unchanged"' class='command_message'
			:class='{"command_message--error":commandState=="error","command_message--unchanged":commandState=="unchanged"}'
			:role='commandState=="error" ? "alert" : "status"'>
			<bdi dir='auto'>{{command.meta.message}}</bdi>
		</div>
	</div>
</template>


<script>
	'use strict';

	Vue.component('datavalue', {
		props: ['dv'],
		data: function () {return {}},
		created: function () { },
		updated: function () {tt.updateInterface(this.$el);},
		mounted: function () {tt.updateInterface(this.$el);},
		methods: {},
		template: '#datavalue-template'
	});

	Vue.component('command', {
		props: ['command', 'site'],
		data: function () {return {file_label: ''}},
		created: function () {
			// HARDCODED HORROR
			if (this.site == 'commons' && typeof this.command.item != 'undefined') {
				this.file_label = this.command.item;
				this.get_file_label(this.command.item);
			}
		},
		updated: function () {tt.updateInterface(this.$el);},
		mounted: function () {tt.updateInterface(this.$el);},
		computed: {
			commandState: function () {
				if (this.isUnchangedSuccess()) return 'unchanged';
				return (this.command.meta.status || 'unknown').toLowerCase();
			},
			commandStateLabel: function () {
				if (this.commandState == 'unchanged') return 'Done; no change needed';
				return this.commandState == 'unknown' ? 'Unknown status' : this.commandState;
			},
			commandStateTitle: function () {
				if (this.commandState == 'unchanged' && this.command.meta.message) return this.command.meta.message;
				return this.commandStateLabel;
			}
		},
		methods: {
			isUnchangedSuccess: function () {
				if ((this.command.meta.status || '').toUpperCase() != 'DONE') return false;
				return /already exists|already has|has already a qualifier/i.test(this.command.meta.message || '');
			},
			load_file_name_from_id: function (m) {
				let me = this;
				let page_id = m.replace(/\D/g, '');
				return new Promise(function (resolve, reject) {
					$.getJSON('https://commons.wikimedia.org/w/api.php?callback=?&action=query&prop=info&format=json&pageids=' + page_id, function (d) {
						let title = ((d.query.pages[page_id] || {}).title || m);
						if (typeof title != 'undefined') me.file_label = title;
						resolve(title)
					})
				});
			},
			get_file_label: function (m) {
				this.load_file_name_from_id(m)
					.then(function (response) {return response;})
			},
		},
		template: '#command-template'
	});
</script>
